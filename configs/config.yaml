# ============================================================
# Maritime VHF ASR – Master Configuration
# ============================================================

project:
  name: "Maritime-VHF-ASR"
  description: "PEFT + Full Fine-Tuning on Real and Simulated Maritime VHF Speech"
  author: "MSc AI Dissertation"
  version: "2.0.0"

# ── Label Studio ─────────────────────────────────────────────
label_studio:
  url: "https://app.heartex.com"
  api_key: ""                        # set via env: LABEL_STUDIO_API_KEY
  projects:
    simulated:
      name: "sim_vhf_dataset"
      id: null
    real:
      name: "Maritime_ASR_Main"
      id: null
  export_format: "JSON"

# ── Data ─────────────────────────────────────────────────────
data:
  real_data_dir: "/content/drive/MyDrive/ASR_Dissertation/data/real"
  simulated_data_dir: "/content/drive/MyDrive/ASR_Dissertation/data/simulated"
  combined_data_dir: "/content/drive/MyDrive/ASR_Dissertation/data/combined"
  sample_rate: 16000
  max_duration: 30.0
  min_duration: 0.5
  normalize_audio: true
  # Silence removal (pydub)
  silence_thresh_dbfs: -35
  min_silence_len_ms: 1500
  # Splits
  train_ratio: 0.80
  val_ratio: 0.10
  test_ratio: 0.10
  random_seed: 42

# ── Models ───────────────────────────────────────────────────
models:
  whisper:
    sizes:
      - "openai/whisper-small"
      - "openai/whisper-medium"
      - "openai/whisper-large"
    language: "english"
    task: "transcribe"
    max_new_tokens: 448

  wav2vec2:
    name: "facebook/wav2vec2-base-960h"
    ctc_zero_infinity: true
    attention_dropout: 0.1
    hidden_dropout: 0.1
    feat_proj_dropout: 0.0
    mask_time_prob: 0.05
    layerdrop: 0.1

# ── Training ─────────────────────────────────────────────────
training:
  output_dir: "/content/drive/MyDrive/ASR_Dissertation/checkpoints"
  num_train_epochs: 100
  per_device_train_batch_size: 4   # effective batch size = per_device × gradient_accum = 32
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 8
  dataloader_num_workers: 2
  weight_decay: 0.01
  max_grad_norm: 1.0
  lr_scheduler_type: "cosine"
  warmup_steps: 10
  fp16: false
  evaluation_strategy: "steps"
  eval_steps: 100
  save_strategy: "steps"
  save_steps: 200
  save_total_limit: 1               # 1 checkpoint during training; post-training cleanup removes it
  load_best_model_at_end: true
  metric_for_best_model: "eval_wer"
  greater_is_better: false
  logging_steps: 5
  logging_dir: "results/logs"
  report_to: ["tensorboard"]
  early_stopping_patience: 5
  early_stopping_threshold: 0.001

# ── PEFT Methods ─────────────────────────────────────────────
peft:
  encoder_freezing:
    learning_rate: 5.0e-5

  # No 8-bit quantisation — causes gradient instability with small datasets.
  # All four attention projections (q/k/v/out) are targeted for full coverage.
  lora:
    learning_rate: 1.0e-3
    r: 32
    lora_alpha: 64
    target_modules: ["q_proj", "k_proj", "v_proj", "out_proj"]
    lora_dropout: 0.05
    bias: "none"

  full_finetuning:
    learning_rate: 1.0e-5           # lower LR for full FT to avoid forgetting

# ── Evaluation ───────────────────────────────────────────────
evaluation:
  batch_size: 16
  results_dir: "/content/drive/MyDrive/ASR_Dissertation/results"

# ── Experiments ──────────────────────────────────────────────
# Full matrix: 3 models × 4 training strategies × 3 data conditions
# Each experiment produces eval results on BOTH real and simulated test sets
# to capture cross-domain generalisation

experiments:

  # ── BASELINES (zero-shot) ──────────────────────────────────
  - name: "baseline_whisper_small"
    model: "whisper"
    model_size: "openai/whisper-small"
    method: "baseline"
    train_data: null

  - name: "baseline_whisper_medium"
    model: "whisper"
    model_size: "openai/whisper-medium"
    method: "baseline"
    train_data: null

  - name: "baseline_wav2vec2"
    model: "wav2vec2"
    model_size: "facebook/wav2vec2-base-960h"
    method: "baseline"
    train_data: null

  # ── ENCODER FREEZING ──────────────────────────────────────
  - name: "ef_whisper_small_real"
    model: "whisper"
    model_size: "openai/whisper-small"
    method: "encoder_freezing"
    train_data: "real"

  - name: "ef_whisper_medium_real"
    model: "whisper"
    model_size: "openai/whisper-medium"
    method: "encoder_freezing"
    train_data: "real"

  - name: "ef_whisper_large_real"
    model: "whisper"
    model_size: "openai/whisper-large"
    method: "encoder_freezing"
    train_data: "real"

  - name: "ef_whisper_small_simulated"
    model: "whisper"
    model_size: "openai/whisper-small"
    method: "encoder_freezing"
    train_data: "simulated"

  - name: "ef_whisper_medium_simulated"
    model: "whisper"
    model_size: "openai/whisper-medium"
    method: "encoder_freezing"
    train_data: "simulated"

  - name: "ef_whisper_large_simulated"
    model: "whisper"
    model_size: "openai/whisper-large"
    method: "encoder_freezing"
    train_data: "simulated"

  - name: "ef_whisper_small_combined"
    model: "whisper"
    model_size: "openai/whisper-small"
    method: "encoder_freezing"
    train_data: "combined"

  - name: "ef_whisper_medium_combined"
    model: "whisper"
    model_size: "openai/whisper-medium"
    method: "encoder_freezing"
    train_data: "combined"

  - name: "ef_whisper_large_combined"
    model: "whisper"
    model_size: "openai/whisper-large"
    method: "encoder_freezing"
    train_data: "combined"

  # ── LoRA (FIXED) ──────────────────────────────────────────
  - name: "lora_whisper_small_real"
    model: "whisper"
    model_size: "openai/whisper-small"
    method: "lora"
    train_data: "real"

  - name: "lora_whisper_medium_real"
    model: "whisper"
    model_size: "openai/whisper-medium"
    method: "lora"
    train_data: "real"

  - name: "lora_whisper_large_real"
    model: "whisper"
    model_size: "openai/whisper-large"
    method: "lora"
    train_data: "real"

  - name: "lora_whisper_small_simulated"
    model: "whisper"
    model_size: "openai/whisper-small"
    method: "lora"
    train_data: "simulated"

  - name: "lora_whisper_medium_simulated"
    model: "whisper"
    model_size: "openai/whisper-medium"
    method: "lora"
    train_data: "simulated"

  - name: "lora_whisper_large_simulated"
    model: "whisper"
    model_size: "openai/whisper-large"
    method: "lora"
    train_data: "simulated"

  - name: "lora_whisper_small_combined"
    model: "whisper"
    model_size: "openai/whisper-small"
    method: "lora"
    train_data: "combined"

  - name: "lora_whisper_medium_combined"
    model: "whisper"
    model_size: "openai/whisper-medium"
    method: "lora"
    train_data: "combined"

  - name: "lora_whisper_large_combined"
    model: "whisper"
    model_size: "openai/whisper-large"
    method: "lora"
    train_data: "combined"

  # ── FULL FINE-TUNING (NEW) ────────────────────────────────
  - name: "full_ft_whisper_small_real"
    model: "whisper"
    model_size: "openai/whisper-small"
    method: "full_finetuning"
    train_data: "real"

  - name: "full_ft_whisper_medium_real"
    model: "whisper"
    model_size: "openai/whisper-medium"
    method: "full_finetuning"
    train_data: "real"

  - name: "full_ft_whisper_large_real"
    model: "whisper"
    model_size: "openai/whisper-large"
    method: "full_finetuning"
    train_data: "real"

  - name: "full_ft_whisper_large_combined"
    model: "whisper"
    model_size: "openai/whisper-large"
    method: "full_finetuning"
    train_data: "combined"

  # ── WAV2VEC2 (NEW MODEL) ──────────────────────────────────
  - name: "ef_wav2vec2_real"
    model: "wav2vec2"
    model_size: "facebook/wav2vec2-base-960h"
    method: "encoder_freezing"
